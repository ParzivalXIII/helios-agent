version: '3.8'

services:
  # Redis: Session state storage and distributed locks
  redis:
    image: redis:7.2-alpine
    container_name: helios-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    command: redis-server --appendonly yes
    networks:
      - helios-network

  # helios-agent: Main FastAPI application
  helios-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: helios-agent
    ports:
      - "8000:8000"
    environment:
      # LLM Configuration
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-your-key-here}
      - LLM_MODEL=${LLM_MODEL:-openrouter/anthropic/claude-3.5-sonnet}
      
      # Redis Configuration
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      
      # Agent Behavior
      - MAX_TURNS=${MAX_TURNS:-5}
      - SESSION_TTL_SECONDS=${SESSION_TTL_SECONDS:-3600}
      - TOOL_TIMEOUT_MS=${TOOL_TIMEOUT_MS:-5000}
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      
      # MCP Configuration
      - MCP_CONFIG_PATH=${MCP_CONFIG_PATH:-./config/mcp_servers.yaml}
    volumes:
      # Mount config directory as read-only (for mcp_servers.yaml)
      - ./config:/app/config:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health", "||", "exit", "1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - helios-network
    restart: unless-stopped

volumes:
  redis-data:
    driver: local

networks:
  helios-network:
    driver: bridge
